<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arkvel-Unit — Post-Quantum Firmware for Autonomous Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg-deep:#070b14;
      --bg-mid:#0b1220;
      --bg-card:#0e1829;
      --bg-hover:#111f36;
      --blue-dark:#1a3a6e;
      --blue-mid:#1d4ed8;
      --blue-accent:#3b7dd8;
      --blue-subtle:rgba(59,125,216,0.12);
      --teal:#2d8c8c;
      --teal-subtle:rgba(45,140,140,0.1);
      --gold:#9c874e;
      --gold-subtle:rgba(156,135,78,0.1);
      --text-1:#dde4ef;
      --text-2:#8895ae;
      --text-3:#4d5c78;
      --border:rgba(45,75,140,0.18);
      --border-hover:rgba(59,125,216,0.28);
      --radius:5px;
      --font-h:'Rajdhani',sans-serif;
      --font-b:'Inter',sans-serif;
      --ease:cubic-bezier(.4,0,.2,1);
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg-deep);color:var(--text-1);font-family:var(--font-b);font-size:15px;line-height:1.65;overflow-x:hidden}
    ::selection{background:var(--blue-mid);color:#fff}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg-deep)}
    ::-webkit-scrollbar-thumb{background:var(--blue-dark);border-radius:3px}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;border:none;background:none;font-family:inherit}

    /* NAV */
    .nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;transition:background .3s var(--ease),box-shadow .3s var(--ease)}
    .nav.solid{background:rgba(7,11,20,.96);backdrop-filter:blur(24px);box-shadow:0 1px 0 var(--border)}
    .nav-logo{display:flex;align-items:center;gap:11px}
    .nav-hex{width:32px;height:32px;background:linear-gradient(145deg,var(--blue-dark),var(--blue-accent));clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:12px;font-weight:700;color:#fff;letter-spacing:1px}
    .nav-name{font-family:var(--font-h);font-size:18px;font-weight:700;letter-spacing:3.5px;text-transform:uppercase;color:var(--text-1)}
    .nav-name em{color:var(--blue-accent);font-style:normal}
    .nav-links{display:flex;gap:32px;list-style:none}
    .nav-links a{font-family:var(--font-h);font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-2);transition:color .25s var(--ease);position:relative;padding-bottom:3px}
    .nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--blue-accent);transition:width .25s var(--ease)}
    .nav-links a:hover{color:var(--text-1)}
    .nav-links a:hover::after{width:100%}
    .nav-btn{font-family:var(--font-h);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#fff;background:var(--blue-mid);padding:7px 20px;border-radius:var(--radius);transition:background .25s var(--ease),box-shadow .25s var(--ease)}
    .nav-btn:hover{background:var(--blue-accent);box-shadow:0 0 20px rgba(59,125,216,.3)}

    /* HERO */
    #hero{position:relative;height:100vh;min-height:680px;display:flex;align-items:center;justify-content:center;overflow:hidden}
    #hero-canvas{position:absolute;inset:0;width:100%;height:100%}
    .hero-veil{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 55%,rgba(11,18,32,.2) 0%,rgba(7,11,20,.75) 100%)}
    .hero-body{position:relative;z-index:5;text-align:center;max-width:800px;padding:0 24px}
    .hero-kicker{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-h);font-size:11px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--teal);margin-bottom:26px}
    .hero-kicker span{display:block;width:32px;height:1px;background:var(--teal);opacity:.6}
    .hero-h1{font-family:var(--font-h);font-size:clamp(46px,8vw,86px);font-weight:700;line-height:1.04;letter-spacing:8px;text-transform:uppercase;color:var(--text-1);margin-bottom:8px}
    .hero-h1 em{color:var(--blue-accent);font-style:normal}
    .hero-sub{font-family:var(--font-h);font-size:clamp(13px,1.8vw,17px);font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--teal);margin-bottom:28px;opacity:.85}
    .hero-lead{font-size:clamp(14px,1.4vw,16px);color:var(--text-2);max-width:580px;margin:0 auto 44px;font-weight:300;line-height:1.85}
    .hero-ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
    .btn-prim{font-family:var(--font-h);font-size:13px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:#fff;background:linear-gradient(135deg,var(--blue-dark),var(--blue-mid));padding:13px 34px;border-radius:var(--radius);border:none;transition:box-shadow .3s var(--ease),transform .3s var(--ease),background .3s var(--ease)}
    .btn-prim:hover{box-shadow:0 0 32px rgba(29,78,216,.35);transform:translateY(-2px);background:linear-gradient(135deg,var(--blue-mid),var(--blue-accent))}
    .btn-sec{font-family:var(--font-h);font-size:13px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-2);background:transparent;padding:12px 34px;border-radius:var(--radius);border:1px solid var(--border-hover);transition:color .25s var(--ease),border-color .25s var(--ease),box-shadow .25s var(--ease)}
    .btn-sec:hover{color:var(--text-1);border-color:rgba(59,125,216,.5);box-shadow:0 0 16px rgba(59,125,216,.1)}
    .hero-scroll{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;z-index:5;opacity:.4}
    .hero-scroll span{font-family:var(--font-h);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-2)}
    .scroll-bar{width:1px;height:44px;background:linear-gradient(to bottom,var(--teal),transparent);animation:barPulse 2.2s ease-in-out infinite}
    @keyframes barPulse{0%,100%{opacity:.3}50%{opacity:.9}}

    /* STATS BAND */
    .stats-band{padding:0;background:var(--bg-mid);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);max-width:1100px;margin:0 auto}
    .stat-cell{padding:32px 28px;text-align:center;border-right:1px solid var(--border);transition:background .25s var(--ease)}
    .stat-cell:last-child{border-right:none}
    .stat-cell:hover{background:var(--bg-hover)}
    .stat-val{font-family:var(--font-h);font-size:38px;font-weight:700;color:var(--text-1);line-height:1;margin-bottom:6px}
    .stat-val em{color:var(--blue-accent);font-style:normal}
    .stat-lbl{font-family:var(--font-h);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-3)}

    /* SECTIONS */
    .sec{padding:112px 5%}
    .sec-alt{background:linear-gradient(180deg,var(--bg-deep) 0%,var(--bg-mid) 50%,var(--bg-deep) 100%)}
    .sec-header{text-align:center;margin-bottom:64px}
    .sec-eye{display:inline-block;font-family:var(--font-h);font-size:10px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--teal);margin-bottom:14px}
    .sec-eye::before,.sec-eye::after{content:'//';margin:0 7px;opacity:.45}
    .sec-h2{font-family:var(--font-h);font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-1);line-height:1.15}
    .sec-h2 em{color:var(--blue-accent);font-style:normal}
    .sec-rule{width:48px;height:2px;background:linear-gradient(90deg,var(--blue-dark),var(--blue-accent));margin:18px auto 0;border-radius:2px}

    /* REVEAL */
    .rv{opacity:0;transform:translateY(24px);transition:opacity .65s var(--ease),transform .65s var(--ease)}
    .rv.in{opacity:1;transform:none}
    .rv.d1{transition-delay:.1s}.rv.d2{transition-delay:.2s}.rv.d3{transition-delay:.3s}.rv.d4{transition-delay:.4s}

    /* ABOUT */
    .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center;max-width:1160px;margin:0 auto}
    .about-text .sec-header{text-align:left;margin-bottom:28px}
    .about-text .sec-rule{margin:16px 0 0}
    .about-p{color:var(--text-2);margin-top:22px;font-size:14px;line-height:1.85}
    .about-p strong{color:var(--text-1);font-weight:600}
    .pillars-box{background:rgba(11,18,32,.7);border:1px solid var(--border);border-radius:7px;padding:36px;position:relative;overflow:hidden}
    .pillars-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue-accent),var(--teal),transparent);opacity:.5}
    .pillars-label{font-family:var(--font-h);font-size:10px;letter-spacing:3.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:24px}
    .pillar{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px}
    .pillar:last-child{margin-bottom:0}
    .p-icon{width:34px;height:34px;flex-shrink:0;background:var(--teal-subtle);border:1px solid rgba(45,140,140,.2);border-radius:var(--radius);display:flex;align-items:center;justify-content:center}
    .p-icon svg{width:15px;height:15px;stroke:var(--teal);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
    .p-title{font-family:var(--font-h);font-size:14px;font-weight:600;letter-spacing:.8px;color:var(--text-1);margin-bottom:3px}
    .p-desc{font-size:12.5px;color:var(--text-3);line-height:1.6}

    /* HESIA */
    .hesia-bg{position:relative;overflow:hidden}
    .hesia-watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font-h);font-size:240px;font-weight:700;letter-spacing:20px;color:rgba(29,78,216,.03);pointer-events:none;white-space:nowrap}
    .hesia-lead{text-align:center;max-width:640px;margin:0 auto 20px;color:var(--text-2);font-size:14px;line-height:1.85}
    .hesia-lead strong{color:var(--text-1)}
    .hesia-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(29,78,216,.08);border:1px solid rgba(29,78,216,.2);border-radius:20px;padding:5px 14px;font-size:11px;font-family:var(--font-h);letter-spacing:2px;text-transform:uppercase;color:var(--blue-accent);margin-bottom:36px}
    .badge-dot{width:7px;height:7px;border-radius:50%;background:var(--blue-accent);box-shadow:0 0 6px var(--blue-accent);animation:dotPulse 2s ease-in-out infinite}
    @keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.3}}
    .feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1160px;margin:0 auto}
    .feat-card{background:rgba(14,24,41,.6);border:1px solid var(--border);border-radius:6px;padding:28px;position:relative;overflow:hidden;transition:border-color .3s var(--ease),box-shadow .3s var(--ease),transform .3s var(--ease)}
    .feat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue-accent),transparent);opacity:0;transition:opacity .3s var(--ease)}
    .feat-card:hover{border-color:var(--border-hover);box-shadow:0 6px 32px rgba(29,78,216,.1);transform:translateY(-3px)}
    .feat-card:hover::before{opacity:1}
    .feat-card.hl{background:linear-gradient(135deg,rgba(26,58,110,.18),rgba(45,140,140,.06));border-color:rgba(45,140,140,.18)}
    .feat-card.gd{background:linear-gradient(135deg,rgba(156,135,78,.06),rgba(14,24,41,.6));border-color:rgba(156,135,78,.15)}
    .feat-n{font-family:var(--font-h);font-size:10px;letter-spacing:3px;color:var(--text-3);margin-bottom:14px}
    .feat-ico{width:42px;height:42px;background:var(--blue-subtle);border:1px solid rgba(59,125,216,.15);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
    .feat-ico svg{width:19px;height:19px;stroke:var(--blue-accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
    .feat-card.hl .feat-ico{background:var(--teal-subtle);border-color:rgba(45,140,140,.2)}
    .feat-card.hl .feat-ico svg{stroke:var(--teal)}
    .feat-card.gd .feat-ico{background:var(--gold-subtle);border-color:rgba(156,135,78,.2)}
    .feat-card.gd .feat-ico svg{stroke:var(--gold)}
    .feat-title{font-family:var(--font-h);font-size:15px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--text-1);margin-bottom:8px;line-height:1.3}
    .feat-desc{font-size:13px;color:var(--text-3);line-height:1.7}
    .feat-desc strong{color:var(--text-2)}
    .feat-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:16px}
    .tag{font-size:10px;font-family:var(--font-h);letter-spacing:1.5px;text-transform:uppercase;color:var(--blue-accent);background:var(--blue-subtle);border:1px solid rgba(59,125,216,.12);padding:2px 7px;border-radius:3px}
    .tag.tl{color:var(--teal);background:var(--teal-subtle);border-color:rgba(45,140,140,.12)}
    .tag.gd{color:var(--gold);background:var(--gold-subtle);border-color:rgba(156,135,78,.12)}

    /* ROADMAP */
    .road-wrap{max-width:860px;margin:0 auto}
    .road-item{position:relative;padding-left:52px;margin-bottom:4px}
    .road-line{position:absolute;left:11px;top:28px;bottom:-4px;width:1px;background:var(--border)}
    .road-item:last-child .road-line{display:none}
    .road-dot{position:absolute;left:4px;top:20px;width:16px;height:16px;border-radius:50%;border:2px solid var(--bg-deep);transition:box-shadow .3s var(--ease)}
    .road-dot.done{background:var(--teal);box-shadow:0 0 10px rgba(45,140,140,.4)}
    .road-dot.active{background:var(--blue-accent);box-shadow:0 0 10px rgba(59,125,216,.5)}
    .road-dot.future{background:var(--gold);box-shadow:0 0 8px rgba(156,135,78,.3)}
    .road-head{display:flex;align-items:center;gap:12px;padding:18px 20px;background:rgba(14,24,41,.5);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:background .25s var(--ease),border-color .25s var(--ease);margin-bottom:2px;user-select:none}
    .road-head:hover{background:var(--bg-hover);border-color:var(--border-hover)}
    .road-head.open{background:var(--bg-hover);border-color:var(--border-hover)}
    .road-phase{font-family:var(--font-h);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text-3)}
    .road-title{font-family:var(--font-h);font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-1);flex:1}
    .road-badge{font-size:9px;font-family:var(--font-h);letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border-radius:10px}
    .rb-done{background:rgba(45,140,140,.1);color:var(--teal);border:1px solid rgba(45,140,140,.2)}
    .rb-act{background:rgba(59,125,216,.1);color:var(--blue-accent);border:1px solid rgba(59,125,216,.2)}
    .rb-plan{background:rgba(156,135,78,.08);color:var(--gold);border:1px solid rgba(156,135,78,.18)}
    .road-chevron{width:16px;height:16px;stroke:var(--text-3);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:transform .3s var(--ease),stroke .25s var(--ease);flex-shrink:0}
    .road-head.open .road-chevron{transform:rotate(180deg);stroke:var(--text-2)}
    .road-body{overflow:hidden;transition:max-height .4s var(--ease),opacity .4s var(--ease)}
    .road-body.closed{max-height:0;opacity:0}
    .road-body.open{opacity:1}
    .road-content{padding:20px 20px 22px;background:rgba(11,18,32,.4);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;margin-bottom:4px}
    .road-desc{font-size:13.5px;color:var(--text-2);line-height:1.8;margin-bottom:16px}
    .road-pts{display:flex;flex-wrap:wrap;gap:8px}
    .road-pt{font-size:12px;font-family:var(--font-h);letter-spacing:.8px;color:var(--text-2);display:flex;align-items:center;gap:5px}
    .road-pt::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--blue-accent);flex-shrink:0}
    .road-item.done-item .road-pt::before{background:var(--teal)}
    .road-item.future-item .road-pt::before{background:var(--gold)}

    /* TECH TABS */
    .tech-tabs{display:flex;gap:4px;justify-content:center;margin-bottom:40px;flex-wrap:wrap}
    .tech-tab{font-family:var(--font-h);font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-3);background:transparent;border:1px solid transparent;padding:8px 20px;border-radius:var(--radius);transition:all .25s var(--ease)}
    .tech-tab:hover{color:var(--text-2);border-color:var(--border)}
    .tech-tab.active{color:var(--text-1);background:var(--bg-card);border-color:var(--border-hover);box-shadow:0 2px 12px rgba(29,78,216,.1)}
    .tech-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;max-width:1100px;margin:0 auto;background:var(--border);border:1px solid var(--border);border-radius:7px;overflow:hidden}
    .tech-cell{background:var(--bg-deep);padding:40px 44px;transition:background .25s var(--ease);animation:fadeIn .4s var(--ease)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .tech-cell:hover{background:var(--bg-card)}
    .tc-n{font-family:var(--font-h);font-size:52px;font-weight:700;color:rgba(29,78,216,.05);position:absolute;top:20px;right:28px;line-height:1;pointer-events:none}
    .tc-wrap{position:relative}
    .tc-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .tc-ico{width:40px;height:40px;background:var(--blue-subtle);border:1px solid rgba(59,125,216,.15);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .tc-ico svg{width:18px;height:18px;stroke:var(--blue-accent);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
    .tc-title{font-family:var(--font-h);font-size:16px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-1)}
    .tc-p{font-size:13.5px;color:var(--text-3);line-height:1.75;margin-bottom:18px}
    .tech-pills{display:flex;flex-wrap:wrap;gap:5px}
    .tech-pill{font-size:10px;font-family:var(--font-h);letter-spacing:1.5px;text-transform:uppercase;color:var(--blue-accent);background:var(--blue-subtle);border:1px solid rgba(59,125,216,.12);padding:3px 9px;border-radius:3px}

    /* CONTACT */
    .contact-wrap{max-width:640px;margin:0 auto}
    .cform{background:rgba(11,18,32,.5);border:1px solid var(--border);border-radius:7px;padding:44px;position:relative;overflow:hidden}
    .cform::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue-accent),transparent);opacity:.4}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .fg{margin-bottom:20px}
    .fg label{display:block;font-family:var(--font-h);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-3);margin-bottom:7px}
    .fg input,.fg select,.fg textarea{width:100%;background:rgba(7,11,20,.8);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;color:var(--text-1);font-family:var(--font-b);font-size:13.5px;outline:none;transition:border-color .25s var(--ease),box-shadow .25s var(--ease);appearance:none}
    .fg select option{background:var(--bg-deep)}
    .fg textarea{resize:vertical;min-height:110px}
    .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue-accent);box-shadow:0 0 0 3px rgba(59,125,216,.08)}
    .fg input.err,.fg select.err,.fg textarea.err{border-color:rgba(220,60,60,.5)}
    .fg input.ok,.fg select.ok,.fg textarea.ok{border-color:rgba(45,140,100,.5)}
    .fg input::placeholder,.fg textarea::placeholder{color:rgba(221,228,239,.18)}
    .err-msg{font-size:11px;color:rgba(220,100,100,.85);margin-top:4px;font-family:var(--font-h);letter-spacing:.8px}
    .fsubmit{text-align:center;margin-top:6px}
    .fnote{font-size:11.5px;color:var(--text-3);text-align:center;margin-top:14px}

const { useState, useEffect, useRef, useCallback } = React;

/* ─── Intersection Observer Hook ─── */
function useInView(opts={threshold:.15,rootMargin:'0px 0px -40px 0px'}) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const el = ref.current; if(!el) return;
    const ob = new IntersectionObserver(([e]) => { if(e.isIntersecting){ setInView(true); ob.disconnect(); }}, opts);
    ob.observe(el);
    return () => ob.disconnect();
  }, []);
  return [ref, inView];
}

/* ─── Reveal Wrapper ─── */
function Rv({children, delay=0, className=''}) {
  const [ref, inView] = useInView();
  return <div ref={ref} className={`rv${inView?' in':''} ${delay?'d'+delay:''} ${className}`}>{children}</div>;
}

/* ─── Animated Counter ─── */
function Counter({to, decimals=0, suffix='', prefix=''}) {
  const [val, setVal] = useState(0);
  const [ref, inView] = useInView({threshold:.5});
  const ran = useRef(false);
  useEffect(() => {
    if(!inView || ran.current) return;
    ran.current = true;
    const dur = 1800, start = performance.now();
    const tick = (now) => {
      const p = Math.min((now - start)/dur, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      setVal(+(ease * to).toFixed(decimals));
      if(p < 1) requestAnimationFrame(tick);
      else setVal(to);
    };
    requestAnimationFrame(tick);
  }, [inView]);
  return <span ref={ref}>{prefix}{typeof val === 'number' && decimals ? val.toFixed(decimals) : val}{suffix}</span>;
}

/* ─── Canvas Hero ─── */
function HeroCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let W, H, particles=[], raf, t=0;
    const resize = () => { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; initP(); };
    function Particle() {
      this.reset = () => { this.x=Math.random()*W; this.y=Math.random()*H; this.vx=(Math.random()-.5)*.35; this.vy=(Math.random()-.5)*.35; this.r=Math.random()*1.2+.4; this.a=Math.random()*.35+.08; this.c=Math.random()>.5?'59,125,216':'45,140,140'; };
      this.reset();
      this.upd = () => { this.x+=this.vx; this.y+=this.vy; if(this.x<0)this.x=W; if(this.x>W)this.x=0; if(this.y<0)this.y=H; if(this.y>H)this.y=0; };
      this.drw = () => { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=`rgba(${this.c},${this.a})`; ctx.fill(); };
    }
    const initP = () => { particles=[]; const n=Math.floor((W*H)/14000); for(let i=0;i<n;i++) particles.push(new Particle()); };
    const drawGrid = () => {
      const C=64, cols=Math.ceil(W/C)+1, rows=Math.ceil(H/C)+1;
      const ox=(t*.25)%C, oy=(t*.12)%C;
      for(let c=0;c<=cols;c++){const x=c*C-ox;const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,'rgba(29,78,216,0)');g.addColorStop(.5,'rgba(29,78,216,0.07)');g.addColorStop(1,'rgba(29,78,216,0)');ctx.strokeStyle=g;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let r=0;r<=rows;r++){const y=r*C-oy;const g=ctx.createLinearGradient(0,0,W,0);g.addColorStop(0,'rgba(29,78,216,0)');g.addColorStop(.5,'rgba(29,78,216,0.07)');g.addColorStop(1,'rgba(29,78,216,0)');ctx.strokeStyle=g;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    };
    const drawConn = () => {
      const D=110;
      for(let i=0;i<particles.length;i++) for(let j=i+1;j<particles.length;j++){
        const dx=particles[i].x-particles[j].x, dy=particles[i].y-particles[j].y, d=Math.sqrt(dx*dx+dy*dy);
        if(d<D){ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.strokeStyle=`rgba(29,78,216,${(1-d/D)*.15})`;ctx.lineWidth=.5;ctx.stroke();}
      }
    };
    const loop = () => { t++; ctx.clearRect(0,0,W,H); drawGrid(); particles.forEach(p=>{p.upd();p.drw();}); drawConn(); raf=requestAnimationFrame(loop); };
    window.addEventListener('resize', resize);
    resize(); loop();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas id="hero-canvas" ref={canvasRef}/>;
}

  const visible = active==='Tout' ? cells : cells.filter(c=>c.cat===active);
  return (
    <section id="technologies" className="sec sec-alt">
      <Rv><div className="sec-header"><div className="sec-eye">Expertise</div><h2 className="sec-h2">Domaines <em>Technologiques</em></h2><div className="sec-rule"/></div></Rv>
      <Rv>
        <div className="tech-tabs">
          {tabs.map(t=><button key={t} className={`tech-tab${active===t?' active':''}`} onClick={()=>setActive(t)}>{t}</button>)}
        </div>
      </Rv>
      <div className="tech-grid" style={visible.length===1?{gridTemplateColumns:'1fr'}:undefined}>
        {visible.map((c,i)=>(
          <div key={c.num} className="tech-cell" style={{animationDelay:`${i*.08}s`}}>
            <div className="tc-wrap">
              <div className="tc-n" style={{position:'absolute',top:'-10px',right:0}}>{c.num}</div>
              <div className="tc-head">
                <div className="tc-ico"><svg viewBox="0 0 24 24">{c.ico}</svg></div>
                <div className="tc-title">{c.title}</div>
              </div>
              <p className="tc-p">{c.desc}</p>
              <div className="tech-pills">{c.pills.map(p=><span key={p} className="tech-pill">{p}</span>)}</div>
            </div>
          </div>
        ))}
      </div>
    </section>
  );
}

/* ─── Contact Form ─── */
function Contact() {
  const init = {firstname:'',lastname:'',org:'',email:'',subject:'',message:''};
  const [form, setForm] = useState(init);
  const [errors, setErrors] = useState({});
  const [touched, setTouched] = useState({});
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);

  const validate = (f) => {
    const e = {};
    if(!f.firstname.trim()) e.firstname = 'Requis';
    if(!f.lastname.trim()) e.lastname = 'Requis';
    if(!f.email.trim()) e.email = 'Requis';
    else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(f.email)) e.email = 'Email invalide';
    if(!f.subject) e.subject = 'Sélectionner un objet';
    if(f.message.trim().length < 10) e.message = 'Message trop court (10 car. min.)';
    return e;
  };

  const change = (k,v) => {
    const nf = {...form,[k]:v};
    setForm(nf);
    if(touched[k]) setErrors(validate(nf));
  };
  const blur = (k) => {
    setTouched(t=>({...t,[k]:true}));
    setErrors(validate(form));
  };
  const submit = (e) => {
    e.preventDefault();
    const all = Object.keys(init).reduce((a,k)=>({...a,[k]:true}),{});
    setTouched(all);
    const errs = validate(form);
    setErrors(errs);
    if(Object.keys(errs).length) return;
    setLoading(true);
    setTimeout(()=>{ setLoading(false); setSent(true); setForm(init); setTouched({}); setErrors({}); setTimeout(()=>setSent(false),4000); },1600);
  };

  const fieldCls = (k) => touched[k] ? (errors[k]?'err':'ok') : '';

  return (
    <section id="contact" className="sec">
      <Rv><div className="sec-header"><div className="sec-eye">Collaboration</div><h2 className="sec-h2">Entrer en <em>Contact</em></h2><div className="sec-rule"/></div></Rv>
      <div className="contact-wrap">
        <Rv>
          <div className="cform">
            <form onSubmit={submit} noValidate>
              <div className="frow">
                <div className="fg">
                  <label>Prénom</label>
                  <input type="text" className={fieldCls('firstname')} value={form.firstname} onChange={e=>change('firstname',e.target.value)} onBlur={()=>blur('firstname')} placeholder="Jean"/>
                  {touched.firstname && errors.firstname && <div className="err-msg">{errors.firstname}</div>}
                </div>
                <div className="fg">
                  <label>Nom</label>
                  <input type="text" className={fieldCls('lastname')} value={form.lastname} onChange={e=>change('lastname',e.target.value)} onBlur={()=>blur('lastname')} placeholder="Dupont"/>
                  {touched.lastname && errors.lastname && <div className="err-msg">{errors.lastname}</div>}
                </div>
              </div>
              <div className="fg">
                <label>Organisation</label>
                <input type="text" value={form.org} onChange={e=>change('org',e.target.value)} placeholder="DGA / Safran / Airbus..."/>
              </div>
              <div className="fg">
                <label>Email</label>
                <input type="email" className={fieldCls('email')} value={form.email} onChange={e=>change('email',e.target.value)} onBlur={()=>blur('email')} placeholder="contact@organisation.fr"/>
                {touched.email && errors.email && <div className="err-msg">{errors.email}</div>}
              </div>
              <div className="fg">
                <label>Objet</label>
                <select className={fieldCls('subject')} value={form.subject} onChange={e=>change('subject',e.target.value)} onBlur={()=>blur('subject')}>
                  <option value="">Sélectionner...</option>
                  {['Partenariat industriel','Démonstration technique','Programme R&D','Appel d\'offre / Qualification','Recrutement','Autre'].map(o=><option key={o}>{o}</option>)}
                </select>
                {touched.subject && errors.subject && <div className="err-msg">{errors.subject}</div>}
              </div>
              <div className="fg">
                <label>Message</label>
                <textarea className={fieldCls('message')} value={form.message} onChange={e=>change('message',e.target.value)} onBlur={()=>blur('message')} placeholder="Décrivez votre projet ou votre besoin..."/>
                {touched.message && errors.message && <div className="err-msg">{errors.message}</div>}
              </div>
              <div className="fsubmit">
                <button type="submit" className="btn-prim" disabled={loading||sent} style={{opacity:loading?.7:1,transition:'all .3s',minWidth:200, background:sent?'linear-gradient(135deg,#1a5c3a,#2d8c60)':undefined}}>
                  {sent ? 'Message Envoyé ✓' : loading ? 'Envoi en cours...' : 'Envoyer le Message'}
                </button>
              </div>
              <p className="fnote">Toutes les communications sont traitées avec la plus stricte confidentialité.</p>
            </form>
          </div>
        </Rv>
        <Rv delay={1}>
          <div className="contact-info">
            <div className="ci"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>contact@arkvel-unit.fr</span></div>
            <div className="ci"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>Paris, France</span></div>
            <div className="ci"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>Habilitation Défense</span></div>
          </div>
        </Rv>
      </div>
    </section>
  );
}
