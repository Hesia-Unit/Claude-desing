# HESIA signed security policy
# Target: Jetson Orin Nano Super runtime profile
# This profile keeps mTLS, pinned ML-DSA identities, TEE attestation and
# OP-TEE session authentication enabled, while explicitly disabling RPMB-only
# requirements that are unavailable on this hardware generation.

schema_version=1
version=2
require_mtls=1
require_attestation=1
require_tee_attestation=1
prod_fuse=1
incident_mode=0

audit_enabled=1
audit_rotate_on_start=0
audit_rotate_interval_sec=86400
require_audit_signing=1

ssl_read_timeout_sec=10
ssl_write_timeout_sec=10
max_control_msg_bytes=10485760
max_frame_bytes=2097152
drone.video_send_queue_max=96
drone.video_min_send_interval_ms=200
rate_limit_bps=20000000
rate_limit_burst=4000000

server.bind_addr=0.0.0.0
server.port=9000
server.cert_dir=/etc/hesia/certs
server.server_cert=server.crt
server.server_key=server.key
server.ca_cert=ca.crt
server.keys_dir=/etc/hesia/keys
server.secure_dir=/etc/hesia/secure
server.drone_pubkey_file=drone_public.bin
server.drone_tee_pubkey_file=drone_tee_attest_pub.bin
server.require_pinned_drone_pubkey=1
server.require_boot_measure_allowlist=0
server.max_conn_total=16
server.max_conn_per_ip=4
server.max_pending_queue=64
server.worker_threads=4
server.forensic_dir=/var/log/hesia/forensic
server.ui_dir=/var/log/hesia/ui
server.audit_log_path=audit.log
server.audit_key_path=audit.key
server.audit_alert_path=alerts.log
server.audit_export_path=audit_export.log
server.audit_signing_key=audit_signing_key.pem
server.audit_signing_pub=audit_signing_pub.pem
server.require_release_signature=0
server.release_target_path=
server.release_sig_path=
server.release_pubkey_path=

drone.cert_dir=/etc/hesia/certs
drone.client_cert=drone.crt
drone.client_key=drone.key
drone.ca_cert=ca.crt
drone.secure_dir=/etc/hesia/secure
drone.require_exporter_binding=1
drone.require_tee_hkdf=0
drone.require_tee_attestation=1
drone.require_optee_session_auth=1
drone.require_mldsa_sign_in_tee=1
drone.allow_ephemeral_dilithium=0
drone.allow_ephemeral_puf=0
drone.tls_pin=0
drone.tls_rekey_bytes=67108864
drone.tls_rekey_seconds=900
drone.sealed_puf_path=hesia_seed.sealed
drone.sealed_dilithium_path=dilithium5_sk.sealed
drone.optee_session_auth_path=optee_session_auth.sealed
drone.require_oem_kdf=0
drone.oem_k1_path=
drone.oem_k2_path=
drone.oem_kdf_label=HESIA_OEM_KDF
drone.oem_kdf_context=drone
drone.firmware_version=1
drone.firmware_version_file=/etc/hesia/firmware_version
drone.require_boot_measure=0
drone.boot_measure_path=
drone.boot_measure_sig_path=
drone.boot_measure_pubkey_path=
drone.require_asset_manifest=0
drone.asset_manifest_path=
drone.asset_manifest_sig_path=
drone.asset_manifest_pubkey_path=
drone.require_ab_slots=0
drone.require_rpmb_rollback_storage=0
drone.audit_log_path=audit.log
drone.audit_key_path=audit.key
drone.audit_alert_path=alerts.log
drone.audit_export_path=audit_export.log
drone.audit_signing_key=audit_signing_key.pem
drone.audit_signing_pub=audit_signing_pub.pem
drone.require_release_signature=0
drone.release_target_path=
drone.release_sig_path=
drone.release_pubkey_path=
drone.server_host=100.101.152.53
drone.server_port=9000
